  <!-- ===================== PDF VIEWER =====================
       Uses <object> — the most reliable cross-browser embed.
       Works natively in Chrome, Firefox, Edge, and desktop
       Safari using each browser's built-in PDF viewer.

       On mobile (where inline PDF is often blocked), the
       fallback inside <object> appears automatically — no
       JavaScript needed.

       TO USE:
         1. Create a /files/ folder in your project root.
         2. Put your PDF inside it.
         3. Replace "files/resume.pdf" in the two places below.
  ======================================================== -->
  <div class="resume-viewer container">

    <object
      class="resume-viewer__frame"
      data="files/randt-resume.pdf"
      type="application/pdf"
      aria-label="Résumé">

      <!-- This only shows if the PDF can't be embedded -->
      <div class="resume-viewer__fallback">
        <p>Your browser doesn't support embedded PDFs.</p>
        <a class="btn" href="files/randt-resume.pdf" target="_blank">Open PDF in new tab →</a>
      </div>

    </object>

  </div>
